# ============================================================================
# K8s Reference Stub — for validation only
# ============================================================================
# Full manifests are maintained in the gtcx-infrastructure repository.
# This file exists so that local tooling (kubeval, kubeconform, etc.) can
# lint against a known schema without needing access to the private infra repo.
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: gtcx-core
  labels:
    app.kubernetes.io/part-of: gtcx-core
    app.kubernetes.io/managed-by: helm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-core-api
  namespace: gtcx-core
  labels:
    app.kubernetes.io/name: gtcx-core-api
    app.kubernetes.io/part-of: gtcx-core
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: gtcx-core-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gtcx-core-api
    spec:
      containers:
        - name: api
          image: gtcx/core:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: gtcx-core-config
            - secretRef:
                name: gtcx-core-secrets
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gtcx-core-api
  namespace: gtcx-core
  labels:
    app.kubernetes.io/name: gtcx-core-api
spec:
  selector:
    app.kubernetes.io/name: gtcx-core-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
