name: Rust Release

on:
  push:
    tags:
      - 'rust-v*'

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.82'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --workspace --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order: crypto first, then dependents
          cargo publish -p gtcx-crypto --allow-dirty
          sleep 30  # Wait for crates.io index update
          cargo publish -p gtcx-zkp --allow-dirty
          cargo publish -p gtcx-consensus --allow-dirty
          cargo publish -p gtcx-network --allow-dirty
          cargo publish -p gtcx-edge --allow-dirty
          # gtcx-node is publish=false (NAPI binary, distributed via npm)
