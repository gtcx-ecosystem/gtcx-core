name: Crypto Native Bindings CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-bindings:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: gtcx-node-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact-name: gtcx-node-linux-arm64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: gtcx-node-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact-name: gtcx-node-darwin-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91'
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck native bindings
        run: pnpm --filter @gtcx/crypto-native typecheck

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build native bindings
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: pnpm --filter @gtcx/crypto-native build:native

      - name: Build TypeScript package
        run: pnpm --filter @gtcx/crypto-native build

      - name: Smoke test native bindings
        if: ${{ !matrix.cross }}
        run: |
          node -e "const n=require('./packages/crypto-native/dist/index.js'); const msg=new TextEncoder().encode('smoke'); const kp=n.generateKeyPair(); const sig=n.sign(msg,kp.privateKey); if(!n.verify(sig,msg,kp.publicKey)) { process.exit(1); } console.log('native-ok');"

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: packages/crypto-native/native/gtcx_node.node

  native-binding-adversarial-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Native binding property tests
        working-directory: rust
        run: cargo test -p gtcx-node --lib
