name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workspace root cleanliness
        run: pnpm check:workspace-root-cleanliness:strict

      - name: Ensure no tracked dist artifacts
        run: pnpm check:dist

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: Crypto dependency content-pin check
        run: pnpm security:crypto-deps

      - name: Secret scan
        run: pnpm security:secret-scan

      - name: Architecture boundaries
        run: pnpm architecture:check

      - name: Governance policy validation
        run: pnpm quality:governance:check

      - name: Certified pack manifest (DTF-5.5.2)
        run: |
          pnpm certified-pack:build-manifest
          pnpm certified-pack:verify-manifest

      - name: Threat matrix validation
        run: pnpm security:threat-matrix

      - name: Update benchmark history snapshot
        run: pnpm perf:update-history

      - name: Performance budget validation
        run: PERF_ENFORCE_TREND=true pnpm perf:check-budgets

      - name: Upload performance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-performance-report
          path: benchmarks/performance-report.json

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Setup Rust toolchain for native crypto build
        uses: dtolnay/rust-toolchain@stable

      - name: Build native crypto bindings
        run: pnpm --filter @gtcx/crypto-native run build:native

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Rust ZKP tests (includes KAT verification)
        working-directory: rust
        run: cargo test -p gtcx-zkp --lib

      - name: Cross-implementation KAT verification (arkworks reference verifier)
        run: pnpm test:kat-cross-impl

      - name: Side-channel statistical benchmark (uint64_is_ge, 100K samples)
        working-directory: rust
        run: cargo test -p gtcx-zkp --lib --features sidechannel-bench -- test_uint64_is_ge_no_timing_leakage

      - name: Differential testing (gtcx-zkp vs arkworks, 100 witnesses)
        working-directory: rust
        run: cargo test -p gtcx-zkp --lib --features differential -- test_differential_gci_threshold_100_witnesses

      - name: Trusted-setup verify (M3.2 / CORE-004 engineering gate)
        working-directory: rust
        run: cargo test -p gtcx-zkp --features trusted-setup-verify --release

      - name: Trusted-setup KAT pin (when transcript.seed published)
        working-directory: rust
        run: |
          if [ -f ../artifacts/trusted-setup/transcript.seed ]; then
            cargo test -p gtcx-zkp --features trusted-setup-verify --release -- groth16_kat_pins_match_published_transcript
          else
            echo "skip: artifacts/trusted-setup/transcript.seed not published"
          fi

      - name: Test
        run: pnpm test

      - name: Critical package coverage
        run: pnpm test:coverage:critical

      - name: Build
        run: pnpm build

      - name: Protocol 22 next-work smoke
        run: pnpm run agent:next-work

      - name: Agent session-start smoke
        run: pnpm run agent:session-start -- --json

      - name: Agent execution bout provisioned (P22 extension)
        run: pnpm run agent:bout:check

      - name: Agent protocols adoption (P1–P28)
        run: pnpm run agent:protocols:check

      - name: API surface baseline check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export API_BASELINE_REF="${{ github.event.pull_request.base.sha }}"
          else
            export API_BASELINE_REF="${{ github.event.before }}"
          fi
          pnpm api:check

      - name: Upload API surface report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-api-surface-report
          path: quality/api-surface-report.json

      - name: Collect KPI history
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KPI_WINDOW_DAYS: '30'
          KPI_WORKFLOWS: 'ci.yml'
        run: pnpm quality:kpi:collect

      - name: Export KPI metrics
        run: pnpm quality:kpi:export

      - name: Upload KPI metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-quality-kpis
          path: |
            artifacts/ci-history.json
            quality/kpi-metrics.json
            docs/quality/10-10-remediation-tracker.md

      - name: Generate provenance manifest
        run: pnpm provenance:generate

      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-provenance-manifest
          path: artifacts/provenance-manifest.json

      - name: Generate API docs
        run: pnpm run docs

      - name: Validate markdown links
        run: pnpm docs:check-links

      - name: Validate docs frontmatter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm docs:check-frontmatter --diff "${{ github.event.pull_request.base.sha }}"
          else
            pnpm docs:check-frontmatter
          fi

      - name: AI evaluation scorecard
        run: pnpm ai:evaluate --output artifacts/ai-scorecard.json

      - name: Upload AI scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-ai-scorecard
          path: artifacts/ai-scorecard.json
          if-no-files-found: error

      - name: Validate AI scorecard artifact
        run: node ./tools/check-ai-scorecard.mjs

      - name: Validate GA release evidence
        run: pnpm release:ga:evidence:check

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify deny(unsafe_code) in all crates
        run: |
          for lib in */src/lib.rs; do
            if ! grep -q 'deny(unsafe_code)' "$lib"; then
              echo "ERROR: $lib missing #![deny(unsafe_code)]"
              exit 1
            fi
          done
          echo "All crates enforce deny(unsafe_code)"

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny audit
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Rust tests
        run: cargo test --workspace --lib

      - name: Rust tests — FIPS feature
        run: cargo test -p gtcx-crypto --features fips --lib

      - name: Rust tests — PKCS#11 feature
        run: cargo test -p gtcx-crypto --features pkcs11 --lib

      - name: Rust tests — Cloud KMS feature
        run: cargo test -p gtcx-crypto --features cloud_kms --lib --test cloud_kms_integration

      - name: Run benchmarks and capture results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cargo bench -p gtcx-crypto --bench hashing -- --sample-size 10 --warm-up-time 1 --measurement-time 2
          cargo bench -p gtcx-crypto --bench signing -- --sample-size 10 --warm-up-time 1 --measurement-time 2
          cargo bench -p gtcx-zkp --bench zkp
        working-directory: rust

      - name: Capture benchmark results to JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node ./tools/capture-benchmark-results.mjs --source=ci:criterion
        working-directory: .

      - name: Upload Criterion results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: criterion-benchmarks
          path: benchmarks/latest-results.json

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'trivy-sbom.cdx.json'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sbom
          path: trivy-sbom.cdx.json

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [ci, rust]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: gtcx/core:ci-${{ github.sha }}
