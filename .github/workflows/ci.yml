name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure no tracked dist artifacts
        run: pnpm check:dist

      - name: Architecture boundaries
        run: pnpm architecture:check

      - name: Governance policy validation
        run: pnpm quality:governance:check

      - name: Threat matrix validation
        run: pnpm security:threat-matrix

      - name: Performance budget validation
        run: pnpm perf:check-budgets

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Critical package coverage
        run: pnpm test:coverage:critical

      - name: Build
        run: pnpm build

      - name: API surface baseline check
        run: pnpm api:check

      - name: Generate provenance manifest
        run: pnpm provenance:generate

      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-provenance-manifest
          path: artifacts/provenance-manifest.json

      - name: Export KPI metrics
        run: pnpm quality:kpi:export

      - name: Upload KPI metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-quality-kpis
          path: |
            quality/kpi-metrics.json
            docs/quality/10-10-remediation-tracker.md

      - name: Generate API docs
        run: pnpm run docs

      - name: Validate markdown links
        run: pnpm docs:check-links

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.82'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --lib

  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'trivy-sbom.cdx.json'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sbom
          path: trivy-sbom.cdx.json

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [ci, rust]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: gtcx/core:ci-${{ github.sha }}
