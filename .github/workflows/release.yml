name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure no tracked dist artifacts
        run: pnpm check:dist

      - name: Architecture boundaries
        run: pnpm architecture:check

      - name: Governance policy validation
        run: pnpm quality:governance:check

      - name: Threat matrix validation
        run: pnpm security:threat-matrix

      - name: Performance budget validation
        run: pnpm perf:check-budgets

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Generate API docs
        run: pnpm run docs

      - name: Validate markdown links
        run: pnpm docs:check-links

      - name: Build packages
        run: pnpm build

      - name: API surface baseline check
        run: |
          BASELINE_REF="${{ github.event.before }}"
          if [ -z "$BASELINE_REF" ] || [ "$BASELINE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASELINE_REF="HEAD~1"
          fi
          API_ENFORCE_SEMVER=true API_BASELINE_REF="$BASELINE_REF" pnpm api:check

      - name: Upload API surface report artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-api-surface-report
          path: quality/api-surface-report.json

      - name: Collect KPI history
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KPI_WINDOW_DAYS: '30'
          KPI_WORKFLOWS: 'ci.yml'
        run: pnpm quality:kpi:collect

      - name: Export KPI metrics
        run: pnpm quality:kpi:export

      - name: Upload KPI metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-kpis
          path: |
            artifacts/ci-history.json
            quality/kpi-metrics.json
            docs/quality/10-10-remediation-tracker.md

      - name: Generate provenance manifest
        run: pnpm provenance:generate

      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance-manifest
          path: artifacts/provenance-manifest.json

      - name: Run tests
        run: pnpm test

      - name: Critical package coverage
        run: pnpm test:coverage:critical

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.82'

      - name: Rust format check
        run: cargo fmt --all -- --check
        working-directory: rust

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: rust

      - name: Rust tests
        run: cargo test --workspace --lib
        working-directory: rust

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
