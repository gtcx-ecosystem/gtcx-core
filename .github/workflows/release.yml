name: Release

on:
  workflow_dispatch:
    inputs:
      provenance_republish:
        description: >-
          Skip doc/format gates for attestations-only republish (security/build/test gates still run).
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Enable Corepack and pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure no tracked dist artifacts
        run: pnpm check:dist

      - name: Architecture boundaries
        run: pnpm architecture:check

      - name: Governance policy validation
        run: pnpm quality:governance:check

      - name: Threat matrix validation
        run: pnpm security:threat-matrix

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: Secret scan
        run: pnpm security:secret-scan

      - name: Update benchmark history snapshot
        run: pnpm perf:update-history

      - name: Performance budget validation
        run: PERF_ENFORCE_TREND=true pnpm perf:check-budgets

      - name: Upload performance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-performance-report
          path: benchmarks/performance-report.json

      - name: Lint
        run: pnpm lint

      - name: Format check
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.provenance_republish != true
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Generate API docs
        run: pnpm run docs

      - name: Build packages
        run: pnpm build

      - name: API surface baseline check
        run: |
          BASELINE_REF="${{ github.event.before }}"
          if [ -z "$BASELINE_REF" ] || [ "$BASELINE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASELINE_REF="HEAD~1"
          fi
          API_ENFORCE_SEMVER=true API_BASELINE_REF="$BASELINE_REF" pnpm api:check

      - name: Upload API surface report artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-api-surface-report
          path: quality/api-surface-report.json

      - name: Generate provenance manifest
        run: pnpm provenance:generate

      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance-manifest
          path: artifacts/provenance-manifest.json

      - name: Validate markdown links
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.provenance_republish != true
        run: pnpm docs:check-links

      - name: Validate doc frontmatter
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.provenance_republish != true
        run: pnpm docs:check-frontmatter

      - name: Validate GA release evidence
        run: pnpm release:ga:evidence:check

      - name: Setup Rust toolchain for native crypto build
        uses: dtolnay/rust-toolchain@stable

      - name: Build native crypto bindings
        run: pnpm --filter @gtcx/crypto-native run build:native

      - name: Run tests
        run: pnpm test

      - name: Critical package coverage
        run: pnpm test:coverage:critical

      - name: Collect KPI history
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KPI_WINDOW_DAYS: '30'
          KPI_WORKFLOWS: 'ci.yml'
        run: pnpm quality:kpi:collect

      - name: Export KPI metrics
        run: pnpm quality:kpi:export

      - name: Upload KPI metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-quality-kpis
          path: |
            artifacts/ci-history.json
            quality/kpi-metrics.json
            docs/quality/10-10-remediation-tracker.md

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.91'

      - name: Rust format check
        run: cargo fmt --all -- --check
        working-directory: rust

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: rust

      - name: Rust tests
        run: cargo test --workspace --lib
        working-directory: rust

      - name: Version packages (changesets)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm version-packages

      - name: Install after version bump
        if: github.event_name == 'workflow_dispatch'
        run: pnpm install

      - name: Rebuild for publish
        if: github.event_name == 'workflow_dispatch'
        run: pnpm build

      - name: Configure npm auth
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec changeset publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm provenance attestations
        if: github.event_name == 'workflow_dispatch'
        run: |
          node ./tools/check-npm-provenance.mjs --strict || {
            echo "::warning::Some packages lack npm attestations. Ensure changeset publish ran with --provenance (OIDC id-token: write)."
            node ./tools/check-npm-provenance.mjs
            exit 1
          }

      - name: Push release tags
        if: github.event_name == 'workflow_dispatch'
        run: git push --follow-tags origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
